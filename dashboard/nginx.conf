server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Control plane management API
    location /api/management/ {
        proxy_pass http://controlplane:19193/management/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health endpoints
    location /api/health/cp {
        proxy_pass http://controlplane:18181/api/check/health;
    }
    location /api/health/dp {
        proxy_pass http://dataplane:38181/api/check/health;
    }
    location /api/health/ih {
        proxy_pass http://identityhub:7090/api/check/health;
    }

    # Data plane public API (for EDR data fetch)
    # Browser sends token via X-Edr-Token; nginx converts to Authorization: Bearer
    location = /api/public {
        proxy_pass http://dataplane:38185/public;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer $http_x_edr_token";
    }
    location /api/public/ {
        proxy_pass http://dataplane:38185/public/;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer $http_x_edr_token";
    }

    # SPA fallback — no-cache on HTML so new deploys are picked up immediately
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
