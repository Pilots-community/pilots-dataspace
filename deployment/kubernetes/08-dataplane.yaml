apiVersion: v1
kind: ConfigMap
metadata:
  name: dataplane-provider-config
  namespace: pilots-dataspace
data:
  dataplane.properties: |
    edc.participant.id=provider
    edc.hostname=provider-dataplane
    
    # Base listener (THIS is the one that defaulted to 8181)
    web.http.port=38181
    web.http.path=/api
    
    # Data plane control API
    web.http.control.port=38182
    web.http.control.path=/control
    
    # Data plane public API
    web.http.public.port=38185
    web.http.public.path=/public
    
    # selector is on controlplane management context (we confirmed v3 works there)
    edc.dpf.selector.url=http://provider-controlplane:19192/control/v1/dataplanes
    
    # transfer proxy token keys
    edc.transfer.proxy.token.signer.privatekey.alias=private-key
    edc.transfer.proxy.token.verifier.publickey.alias=public-key
    edc.transfer.proxy.token.signer.privatekey.path=/app/certs/private-key.pem
    edc.transfer.proxy.token.verifier.publickey.path=/app/certs/public-key.pem
    
    edc.dataplane.api.public.baseurl=http://provider-dataplane:38185/public
    
    # PostgreSQL persistence
    edc.sql.schema.autocreate=true
    edc.datasource.default.url=jdbc:postgresql://postgres:5432/provider_dataplane
    edc.datasource.default.user=edc
    
    # HashiCorp Vault
    edc.vault.hashicorp.url=http://vault:8200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataplane-consumer-config
  namespace: pilots-dataspace
data:
  dataplane-consumer.properties: |
    edc.participant.id=did:web:consumer-identityhub%3A7083
    edc.hostname=consumer-dataplane
    
    # Base listener (THIS is the one that defaulted to 8181)
    web.http.port=48181
    web.http.path=/api
    
    # Data plane control API
    web.http.control.port=48182
    web.http.control.path=/control
    
    # Data plane public API
    web.http.public.port=48185
    web.http.public.path=/public
    
    # selector is on controlplane management context (we confirmed v3 works there)
    edc.dpf.selector.url=http://consumer-controlplane:29192/control/v1/dataplanes
    
    # transfer proxy token keys
    edc.transfer.proxy.token.signer.privatekey.alias=private-key
    edc.transfer.proxy.token.verifier.publickey.alias=public-key
    edc.transfer.proxy.token.signer.privatekey.path=/app/certs/private-key.pem
    edc.transfer.proxy.token.verifier.publickey.path=/app/certs/public-key.pem
    
    edc.dataplane.api.public.baseurl=http://consumer-dataplane:48185/public
    
    # PostgreSQL persistence
    edc.sql.schema.autocreate=true
    edc.datasource.default.url=jdbc:postgresql://postgres:5432/consumer_dataplane
    edc.datasource.default.user=edc
    
    # HashiCorp Vault
    edc.vault.hashicorp.url=http://vault:8200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-dataplane
  namespace: pilots-dataspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provider-dataplane
  template:
    metadata:
      labels:
        app: provider-dataplane
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-vault
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z vault 8200; do echo waiting for vault; sleep 2; done;']
      - name: wait-for-controlplane
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z provider-controlplane 19192; do echo waiting for provider-controlplane; sleep 2; done;']
      containers:
      - name: dataplane
        image: pilotsdataspaceregistry.azurecr.io/dataplane:latest
        command:
        - sh
        - -c
        - unset WEB_HTTP_PORT WEB_HTTP_PATH && exec java -Djava.security.egd=file:/dev/urandom -Dedc.fs.config=/app/config/dataplane.properties -jar edc-dataplane.jar
        ports:
        - containerPort: 38181
          name: default
        - containerPort: 38182
          name: control
        - containerPort: 38185
          name: public
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: certs
          mountPath: /app/certs
        env:
        - name: EDC_API_AUTH_KEY
          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: api-auth-key
        - name: EDC_DATASOURCE_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: postgres-password
        - name: EDC_VAULT_HASHICORP_TOKEN
          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: vault-token
        livenessProbe:
          httpGet:
            path: /api/check/health
            port: 38181
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/check/health
            port: 38181
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: dataplane-provider-config
      - name: certs
        secret:
          secretName: dataplane-certs
          # Note: You need to create this secret with your certificate files
---
