apiVersion: v1
kind: Service
metadata:
  name: provider-dataplane
  namespace: pilots-dataspace
spec:
  selector:
    app: provider-dataplane
  ports:
  - port: 38181
    targetPort: 38181
    name: default
  - port: 38182
    targetPort: 38182
    name: control
  - port: 38185
    targetPort: 38185
    name: public
  type: ClusterIP
---
