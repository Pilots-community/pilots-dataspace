apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilots-provider-protocol-ingress
  namespace: pilots-dataspace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /protocol/$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-Api-Key"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - pilots-dataspace.westeurope.cloudapp.azure.com
    secretName: pilots-dataspace-tls
  rules:
  - host: pilots-dataspace.westeurope.cloudapp.azure.com
    http:
      paths:
      - path: /provider/protocol/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: provider-controlplane
            port:
              number: 19194
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilots-identity-ingress
  namespace: pilots-dataspace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-Api-Key"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - pilots-dataspace.westeurope.cloudapp.azure.com
    secretName: pilots-dataspace-tls
  rules:
  - host: pilots-dataspace.westeurope.cloudapp.azure.com
    http:
      paths:
      # Provider IdentityHub - DID API
      - path: /provider/identity/did/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: provider-identityhub
            port:
              number: 7093

      # DID Server (legacy path-based access; primary endpoint is /.well-known/did.json via 13-did-web.yaml)
      - path: /did-server/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: did-server
            port:
              number: 9876
---
