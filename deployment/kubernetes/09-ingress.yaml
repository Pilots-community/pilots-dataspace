apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilots-identity-ingress
  namespace: pilots-dataspace
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-Api-Key"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: ""
    http:
      paths:
      # Provider IdentityHub - DID API
      - path: /provider/identity/did/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: provider-identityhub
            port:
              number: 7093
      
      # Provider IdentityHub - STS API
      - path: /provider/identity/sts/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: provider-identityhub
            port:
              number: 7096
      
      # Consumer IdentityHub - DID API
      - path: /consumer/identity/did/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consumer-identityhub
            port:
              number: 7083
      
      # Consumer IdentityHub - STS API
      - path: /consumer/identity/sts/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consumer-identityhub
            port:
              number: 7086
      
      # DID Server
      - path: /did-server/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: did-server
            port:
              number: 9876
