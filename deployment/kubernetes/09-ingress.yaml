apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilots-provider-mgmt-ingress
  namespace: pilots-dataspace
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /management/$1
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-Api-Key"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /provider/management/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: provider-controlplane
            port:
              number: 19193
---
