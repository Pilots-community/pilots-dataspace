apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: pilots-dataspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
      - name: vault
        image: hashicorp/vault:1.15
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: vault-token
        - name: VAULT_DEV_LISTEN_ADDRESS
          value: "0.0.0.0:8200"
        - name: VAULT_ADDR
          value: "http://127.0.0.1:8200"
        ports:
        - containerPort: 8200
          name: vault
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
        livenessProbe:
          exec:
            command:
            - vault
            - status
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - vault
            - status
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: pilots-dataspace
spec:
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
    name: vault
  type: ClusterIP
