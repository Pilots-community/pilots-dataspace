apiVersion: v1
kind: Secret
metadata:
  name: pilots-dataspace-secrets
  namespace: pilots-dataspace
type: Opaque
stringData:
  # PostgreSQL
  postgres-user: edc
  postgres-password: REPLACE_ME

  # Vault (dev mode)
  vault-token: REPLACE_ME

  # EDC management API auth key (used by the frontend and scripts)
  api-auth-key: REPLACE_ME

  # IdentityHub super-user key (format: base64(user).token)
  superuser-token: REPLACE_ME
