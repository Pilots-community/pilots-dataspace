          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: api-auth-key
        - name: EDC_DATASOURCE_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: postgres-password
        - name: EDC_VAULT_HASHICORP_TOKEN
          valueFrom:
            secretKeyRef:
              name: pilots-dataspace-secrets
              key: vault-token
        ports:
        - containerPort: 28181
          name: default
        - containerPort: 29192
          name: control
        - containerPort: 29193
          name: management
        - containerPort: 29194
          name: protocol
        volumeMounts:
        - name: config
          mountPath: /app/config
        livenessProbe:
          httpGet:
            path: /api/check/health
            port: 28181
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/check/health
            port: 28181
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: controlplane-consumer-config
---
apiVersion: v1
kind: Service
metadata:
  name: provider-controlplane
  namespace: pilots-dataspace
spec:
  selector:
    app: provider-controlplane
  ports:
  - port: 18181
    targetPort: 18181
    name: default
  - port: 19192
    targetPort: 19192
    name: control
  - port: 19193
    targetPort: 19193
    name: management
  - port: 19194
    targetPort: 19194
    name: protocol
  type: ClusterIP
---
