# Standalone connector deployment — one participant per machine.
#
# Usage:
#   cp .env.example .env   # set MY_PUBLIC_HOST + TRUSTED_ISSUER_DIDS
#   docker compose up -d
#   MY_PUBLIC_HOST=<ip> ./seed.sh
#
# MY_PUBLIC_HOST is the externally-routable IP or hostname (e.g. a Tailscale IP).
# TRUSTED_ISSUER_DIDS is a comma-separated list of all issuer DIDs in the dataspace.

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc
      POSTGRES_DB: controlplane
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../config/docker/postgres-connector-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc -d controlplane"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  did-server:
    image: nginx:alpine
    container_name: did-server
    ports:
      - "9876:9876"
    volumes:
      - did-server-content:/usr/share/nginx/html/.well-known
      - ../../deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:9876/.well-known/did.json 2>/dev/null || nc -z 127.0.0.1 9876"]
      interval: 5s
      timeout: 5s
      retries: 10

  identityhub:
    image: identityhub:latest
    container_name: identityhub
    command: >
      sh -c "exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/identityhub-connector.properties
      -Dedc.hostname=${MY_PUBLIC_HOST}
      -Dedc.iam.sts.privatekey.alias=did:web:${MY_PUBLIC_HOST}%3A7093-alias
      -Dedc.iam.sts.publickey.id=did:web:${MY_PUBLIC_HOST}%3A7093#key-1
      -jar identityhub.jar"
    ports:
      - "7090:7090"
      - "7091:7091"
      - "7092:7092"
      - "7093:7093"
      - "7095:7095"
      - "7096:7096"
    volumes:
      - ../../config/docker/identityhub-connector.properties:/app/config/identityhub-connector.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7090/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  controlplane:
    image: controlplane:latest
    container_name: controlplane
    command: >
      sh -c "unset WEB_HTTP_PORT WEB_HTTP_PATH &&
      exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/controlplane-connector.properties
      -Dedc.participant.id=did:web:${MY_PUBLIC_HOST}%3A7093
      -Dedc.iam.issuer.id=did:web:${MY_PUBLIC_HOST}%3A7093
      -Dedc.iam.sts.privatekey.alias=did:web:${MY_PUBLIC_HOST}%3A7093-alias
      -Dedc.iam.sts.publickey.id=did:web:${MY_PUBLIC_HOST}%3A7093#key-1
      -Dedc.iam.sts.oauth.client.id=did:web:${MY_PUBLIC_HOST}%3A7093
      -Dedc.iam.sts.oauth.client.secret.alias=did:web:${MY_PUBLIC_HOST}%3A7093-sts-client-secret
      -Dedc.iam.sts.oauth.token.url=http://identityhub:7096/api/sts/token
      -Dedc.dsp.callback.address=http://${MY_PUBLIC_HOST}:19194/protocol
      -Dedc.demo.dcp.trusted.issuer.dids=${TRUSTED_ISSUER_DIDS}
      -jar edc-controlplane.jar"
    ports:
      - "18181:18181"
      - "19192:19192"
      - "19193:19193"
      - "19194:19194"
    volumes:
      - ../../config/docker/controlplane-connector.properties:/app/config/controlplane-connector.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      identityhub:
        condition: service_healthy
      did-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:18181/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  dataplane:
    image: dataplane:latest
    container_name: dataplane
    command: >
      sh -c "unset WEB_HTTP_PORT WEB_HTTP_PATH &&
      exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/dataplane-connector.properties
      -Dedc.dataplane.api.public.baseurl=http://${MY_PUBLIC_HOST}:38185/public
      -jar edc-dataplane.jar"
    ports:
      - "38181:38181"
      - "38182:38182"
      - "38185:38185"
    volumes:
      - ../../config/docker/dataplane-connector.properties:/app/config/dataplane-connector.properties:ro
      - ../../config/certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      controlplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:38181/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build: ../../dashboard
    container_name: dashboard
    ports:
      - "3000:80"
    depends_on:
      controlplane:
        condition: service_healthy

  http-receiver:
    image: python:3-alpine
    container_name: http-receiver
    command: python /app/server.py
    ports:
      - "4000:4000"
    volumes:
      - ../../deployment/http-receiver/server.py:/app/server.py:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  did-server-content:
