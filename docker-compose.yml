services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc
      POSTGRES_DB: participant_1_controlplane
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc -d participant_1_controlplane"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  did-server:
    image: nginx:alpine
    container_name: did-server
    ports:
      - "9876:9876"
    volumes:
      - ./deployment/assets/issuer/did.json:/usr/share/nginx/html/.well-known/did.json:ro
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9876/.well-known/did.json"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-1-identityhub:
    image: identityhub:latest
    container_name: participant-1-identityhub
    command: >
      sh -c "exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/identityhub-participant-1.properties
      -jar identityhub.jar"
    ports:
      - "7090:7090"
      - "7091:7091"
      - "7092:7092"
      - "7093:7093"
      - "7095:7095"
      - "7096:7096"
    volumes:
      - ./config/docker/identityhub-participant-1.properties:/app/config/identityhub-participant-1.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7090/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-2-identityhub:
    image: identityhub:latest
    container_name: participant-2-identityhub
    command: >
      sh -c "exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/identityhub-participant-2.properties
      -jar identityhub.jar"
    ports:
      - "7080:7080"
      - "7081:7081"
      - "7082:7082"
      - "7083:7083"
      - "7085:7085"
      - "7086:7086"
    volumes:
      - ./config/docker/identityhub-participant-2.properties:/app/config/identityhub-participant-2.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7080/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-1-controlplane:
    image: controlplane:latest
    container_name: participant-1-controlplane
    command: >
      sh -c "unset WEB_HTTP_PORT WEB_HTTP_PATH &&
      exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/controlplane-participant-1.properties
      -jar edc-controlplane.jar"
    ports:
      - "18181:18181"
      - "19192:19192"
      - "19193:19193"
      - "19194:19194"
    volumes:
      - ./config/docker/controlplane-participant-1.properties:/app/config/controlplane-participant-1.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      participant-1-identityhub:
        condition: service_healthy
      did-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:18181/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-2-controlplane:
    image: controlplane:latest
    container_name: participant-2-controlplane
    command: >
      sh -c "unset WEB_HTTP_PORT WEB_HTTP_PATH &&
      exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/controlplane-participant-2.properties
      -jar edc-controlplane.jar"
    ports:
      - "28181:28181"
      - "29192:29192"
      - "29193:29193"
      - "29194:29194"
    volumes:
      - ./config/docker/controlplane-participant-2.properties:/app/config/controlplane-participant-2.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      participant-2-identityhub:
        condition: service_healthy
      did-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:28181/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-1-dataplane:
    image: dataplane:latest
    container_name: participant-1-dataplane
    command: >
      sh -c "unset WEB_HTTP_PORT WEB_HTTP_PATH &&
      exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/dataplane-participant-1.properties
      -jar edc-dataplane.jar"
    ports:
      - "38181:38181"
      - "38182:38182"
      - "38185:38185"
    volumes:
      - ./config/docker/dataplane-participant-1.properties:/app/config/dataplane-participant-1.properties:ro
      - ./config/certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      participant-1-controlplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:38181/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-2-dataplane:
    image: dataplane:latest
    container_name: participant-2-dataplane
    command: >
      sh -c "unset WEB_HTTP_PORT WEB_HTTP_PATH &&
      exec java -Djava.security.egd=file:/dev/urandom
      -Dedc.fs.config=/app/config/dataplane-participant-2.properties
      -jar edc-dataplane.jar"
    ports:
      - "48181:48181"
      - "48182:48182"
      - "48185:48185"
    volumes:
      - ./config/docker/dataplane-participant-2.properties:/app/config/dataplane-participant-2.properties:ro
      - ./config/certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      participant-2-controlplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:48181/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  participant-1-dashboard:
    build: ./dashboard
    container_name: participant-1-dashboard
    ports:
      - "3000:80"
    environment:
      CP_HOST: participant-1-controlplane
      CP_MGMT_PORT: "19193"
      CP_HEALTH_PORT: "18181"
      DP_HOST: participant-1-dataplane
      DP_HEALTH_PORT: "38181"
      DP_PUBLIC_PORT: "38185"
      IH_HOST: participant-1-identityhub
      IH_HEALTH_PORT: "7090"
    depends_on:
      participant-1-controlplane:
        condition: service_healthy

  participant-2-dashboard:
    build: ./dashboard
    container_name: participant-2-dashboard
    ports:
      - "3001:80"
    environment:
      CP_HOST: participant-2-controlplane
      CP_MGMT_PORT: "29193"
      CP_HEALTH_PORT: "28181"
      DP_HOST: participant-2-dataplane
      DP_HEALTH_PORT: "48181"
      DP_PUBLIC_PORT: "48185"
      IH_HOST: participant-2-identityhub
      IH_HEALTH_PORT: "7080"
    depends_on:
      participant-2-controlplane:
        condition: service_healthy

  http-receiver:
    image: python:3-alpine
    container_name: http-receiver
    command: python /app/server.py
    ports:
      - "4000:4000"
    volumes:
      - ./deployment/http-receiver/server.py:/app/server.py:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
